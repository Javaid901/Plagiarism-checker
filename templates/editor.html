<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlagiaShield — Document Editor</title>
    <link rel="stylesheet" href="/static/editor.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .toast-container {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: toastIn 0.3s ease-out;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
            pointer-events: all;
            max-width: 320px;
        }
        .toast-success { background: #065f46; color: #d1fae5; border: 1px solid #059669; }
        .toast-error { background: #7f1d1d; color: #fee2e2; border: 1px solid #dc2626; }
        .toast-info { background: #1e3a5f; color: #dbeafe; border: 1px solid #2563eb; }
        .toast-hide { animation: toastOut 0.3s ease-out forwards; }
        @keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes toastOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }
    </style>
</head>
<body>

    <!-- Top Bar -->
    <div class="editor-topbar">
        <div class="brand">
            <i class="fas fa-shield-halved"></i>
            <span>Plagia<span class="highlight">Shield</span> Document Editor</span>
        </div>
        <div class="topbar-actions">
            <button class="btn btn-secondary" onclick="goBack()"><i class="fas fa-arrow-left"></i> Back</button>
            <button class="btn btn-secondary" onclick="clearEditor()"><i class="fas fa-eraser"></i> Clear</button>
            <button class="btn btn-primary" onclick="downloadHTML()"><i class="fas fa-download"></i> Download HTML</button>
        </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
        <div class="toolbar-group">
            <button class="toolbar-btn" onclick="undoAction()" title="Undo"><i class="fas fa-rotate-left"></i></button>
            <button class="toolbar-btn" onclick="redoAction()" title="Redo"><i class="fas fa-rotate-right"></i></button>
        </div>

        <div class="toolbar-group">
            <select class="toolbar-select" id="heading-select" title="Heading">
                <option value="">Heading</option>
                <option value="h1">H1</option>
                <option value="h2">H2</option>
                <option value="h3">H3</option>
                <option value="h4">H4</option>
                <option value="h5">H5</option>
                <option value="h6">H6</option>
                <option value="p">Paragraph</option>
            </select>
            <select class="toolbar-select" id="font-family" title="Font Family">
                <option value="Inter">Inter</option>
                <option value="Arial">Arial</option>
                <option value="Georgia">Georgia</option>
                <option value="Times New Roman">Times New Roman</option>
                <option value="Courier New">Courier New</option>
                <option value="monospace">Monospace</option>
            </select>
            <select class="toolbar-select" id="font-size" title="Font Size">
                <option value="1">Tiny</option>
                <option value="2">Small</option>
                <option value="3" selected>Normal</option>
                <option value="4">Medium</option>
                <option value="5">Large</option>
                <option value="6">X-Large</option>
                <option value="7">Huge</option>
            </select>
        </div>

        <div class="toolbar-group">
            <button class="toolbar-btn" data-cmd="bold" onclick="execCmd('bold')" title="Bold"><i class="fas fa-bold"></i></button>
            <button class="toolbar-btn" data-cmd="italic" onclick="execCmd('italic')" title="Italic"><i class="fas fa-italic"></i></button>
            <button class="toolbar-btn" data-cmd="underline" onclick="execCmd('underline')" title="Underline"><i class="fas fa-underline"></i></button>
            <button class="toolbar-btn" data-cmd="strikeThrough" onclick="execCmd('strikeThrough')" title="Strikethrough"><i class="fas fa-strikethrough"></i></button>
            <button class="toolbar-btn" onclick="clearFormatting()" title="Clear Formatting"><i class="fas fa-eraser"></i></button>
        </div>

        <div class="toolbar-group">
            <button class="toolbar-btn" data-cmd="justifyLeft" onclick="execCmd('justifyLeft')" title="Align Left"><i class="fas fa-align-left"></i></button>
            <button class="toolbar-btn" data-cmd="justifyCenter" onclick="execCmd('justifyCenter')" title="Align Center"><i class="fas fa-align-center"></i></button>
            <button class="toolbar-btn" data-cmd="justifyRight" onclick="execCmd('justifyRight')" title="Align Right"><i class="fas fa-align-right"></i></button>
            <button class="toolbar-btn" data-cmd="justifyFull" onclick="execCmd('justifyFull')" title="Justify"><i class="fas fa-align-justify"></i></button>
        </div>

        <div class="toolbar-group">
            <button class="toolbar-btn" data-cmd="insertUnorderedList" onclick="execCmd('insertUnorderedList')" title="Bullet List"><i class="fas fa-list-ul"></i></button>
            <button class="toolbar-btn" data-cmd="insertOrderedList" onclick="execCmd('insertOrderedList')" title="Numbered List"><i class="fas fa-list-ol"></i></button>
            <button class="toolbar-btn" onclick="outdentAction()" title="Outdent"><i class="fas fa-outdent"></i></button>
            <button class="toolbar-btn" onclick="indentAction()" title="Indent"><i class="fas fa-indent"></i></button>
        </div>

        <div class="toolbar-group">
            <button class="toolbar-btn" onclick="insertQuote()" title="Blockquote"><i class="fas fa-quote-right"></i></button>
            <button class="toolbar-btn" onclick="insertCode()" title="Code Block"><i class="fas fa-code"></i></button>
            <button class="toolbar-btn" onclick="insertHR()" title="Horizontal Rule"><i class="fas fa-minus"></i></button>
            <button class="toolbar-btn" onclick="execCmd('subscript')" title="Subscript"><i class="fas fa-subscript"></i></button>
            <button class="toolbar-btn" onclick="execCmd('superscript')" title="Superscript"><i class="fas fa-superscript"></i></button>
        </div>

        <div class="toolbar-group">
            <button class="toolbar-btn" onclick="insertLink()" title="Insert Link"><i class="fas fa-link"></i></button>
            <button class="toolbar-btn" onclick="insertImage()" title="Insert Image"><i class="fas fa-image"></i></button>
            <button class="toolbar-btn" onclick="insertTable()" title="Insert Table"><i class="fas fa-table"></i></button>
        </div>

        <div class="toolbar-group">
            <input type="color" class="toolbar-color" id="text-color" value="#6366f1" title="Text Color">
            <input type="color" class="toolbar-color" id="bg-color" value="#1a2035" title="Highlight Color">
        </div>

        <div class="toolbar-group">
            <button class="toolbar-btn" onclick="copyHTML()" title="Copy HTML"><i class="fas fa-code"></i></button>
            <button class="toolbar-btn" onclick="copyText()" title="Copy Text"><i class="fas fa-copy"></i></button>
            <button class="toolbar-btn" onclick="downloadText()" title="Download as TXT"><i class="fas fa-file-lines"></i></button>
            <button class="toolbar-btn" onclick="toggleFindReplace()" title="Find &amp; Replace"><i class="fas fa-search"></i></button>
        </div>
    </div>

    <!-- Find & Replace Bar -->
    <div class="find-replace-bar" id="findReplaceBar" style="display:none;">
        <i class="fas fa-search" style="color:var(--text-muted);font-size:13px;"></i>
        <input type="text" id="findInput" placeholder="Find..." oninput="findInEditor()">
        <input type="text" id="replaceInput" placeholder="Replace with...">
        <button class="btn btn-secondary" style="padding:4px 10px;font-size:11px;" onclick="replaceOne()"><i class="fas fa-arrow-right"></i> Replace</button>
        <button class="btn btn-secondary" style="padding:4px 10px;font-size:11px;" onclick="replaceAll()"><i class="fas fa-forward"></i> All</button>
        <span id="findCount" style="font-size:11px;color:var(--text-muted);"></span>
        <button class="btn btn-secondary" style="padding:4px 8px;font-size:11px;" onclick="toggleFindReplace()"><i class="fas fa-times"></i></button>
    </div>

    <!-- Format Tools Bar (sticky below main toolbar) -->
    <div class="format-bar" id="format-bar">
        <div class="format-bar-inner">
            <span id="editor-format-detect" class="editor-format-detect"></span>
            <div class="format-bar-divider"></div>
            <button class="format-bar-btn primary" onclick="editorFormat('auto')" title="Auto-Format"><i class="fas fa-bolt"></i> Auto</button>
            <button class="format-bar-btn" onclick="editorFormat('paragraphs')" title="Paragraphs"><i class="fas fa-paragraph"></i></button>
            <button class="format-bar-btn" onclick="editorFormat('bullet-list')" title="Bullet List"><i class="fas fa-list-ul"></i></button>
            <button class="format-bar-btn" onclick="editorFormat('numbered-list')" title="Numbered List"><i class="fas fa-list-ol"></i></button>
            <button class="format-bar-btn" onclick="editorFormat('blog-post')" title="Blog Post"><i class="fas fa-newspaper"></i></button>
            <div class="format-bar-divider"></div>
            <button class="format-bar-btn" onclick="editorFormat('title-case')" title="Title Case"><i class="fas fa-heading"></i> T</button>
            <button class="format-bar-btn" onclick="editorFormat('sentence-case')" title="Sentence Case"><i class="fas fa-font"></i> S</button>
            <button class="format-bar-btn" onclick="editorFormat('uppercase')" title="UPPERCASE"><i class="fas fa-uppercase"></i></button>
            <button class="format-bar-btn" onclick="editorFormat('lowercase')" title="lowercase"><i class="fas fa-lowercase"></i></button>
            <button class="format-bar-btn" onclick="editorFormat('remove-whitespace')" title="Clean Spaces"><i class="fas fa-compress-arrows-alt"></i></button>
            <button class="format-bar-btn" onclick="editorFormat('code-block')" title="Code Block"><i class="fas fa-code"></i></button>
        </div>
    </div>

    <!-- Editor Area -->
    <div class="editor-container">
        <div class="editor-content" id="editor" contenteditable="true" placeholder="Start typing or paste your text here..."></div>
    </div>

    <!-- Status Bar -->
    <div class="editor-statusbar">
        <div class="word-count">
            <span><i class="fas fa-font"></i> <span id="word-count">0 words</span></span>
            <span><i class="fas fa-text-width"></i> <span id="char-count">0 chars</span></span>
        </div>
        <div>
            <button class="btn btn-secondary" style="padding:4px 10px;font-size:11px;" onclick="downloadText()"><i class="fas fa-file-export"></i> TXT</button>
            <button class="btn btn-secondary" style="padding:4px 10px;font-size:11px;" onclick="downloadHTML()"><i class="fas fa-file-code"></i> HTML</button>
        </div>
    </div>

    <div class="editor-statusbar" style="justify-content:center;border-top:1px solid var(--border);font-size:12px;color:var(--text-muted);">
        <i class="fas fa-code"></i> Designed &amp; Developed by <strong>JAVAID BHAT</strong>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="/static/editor.js"></script>
</body>
</html>
